appId: com.ralle1976.swyxconnect
productName: SwyxConnect
directories:
  buildResources: resources
  output: dist
asar: false
asarUnpack:
  - '**/*.node'
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!bridge/*'
  - '!tests/*'
  - '!plugins/*'
  - '!scripts/*'
  - '!electron.vite.config.*'
  - '!{.eslintrc,.gitignore,tsconfig.json}'
extraResources:
  - from: out/bridge/
    to: bridge/
    filter:
      - '**/*'
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.png
    to: icon.png
win:
  target:
    - target: nsis
      arch:
        - ia32
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  shortcutName: SwyxConnect
